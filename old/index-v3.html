<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Traveling in Google Maps — v3 Rewrite</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
        }
        #map {
            width: 100%;
            height: 80vh;
        }
        #controls {
            padding: 10px 20px;
            text-align: center;
        }
        button {
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #c73650;
        }
        #status {
            padding: 5px 10px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="controls">
        <button onclick="startDemo()">Go!</button>
        <span id="status"></span>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCyMpQf6Ndp5WWOGfT245KHDhin5v1gWWw&libraries=geometry" type="text/javascript"></script>
    <script src="app.js"></script>
</body>
</html>
